services:
  - type: web
    name: keyword-record-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_NAME
        value: keyword_record
      - key: DB_URL
        sync: false
